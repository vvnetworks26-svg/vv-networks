services:
  - type: web
    name: vv-networks-api
    runtime: node
    region: oregon
    plan: starter                  # upgrade from free for zero-sleep
    healthCheckPath: /api/ready
    buildCommand: npm ci && npm run build:server
    startCommand: npm start
    autoDeploy: true

    envVars:
      # ── Core ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000               # Render assigns 10000 by default
      - key: APP_NAME
        value: vv-networks
      - key: APP_URL
        sync: false                # set in Render dashboard

      # ── Security ──────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates 64-char secret
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 30d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: TRUST_PROXY
        value: "true"

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CORS_ORIGIN
        sync: false                # set to https://your-app.vercel.app

      # ── Database ──────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false                # set in Render dashboard — never commit

      # ── Stripe ────────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── AI ────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Logging ───────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: COMPRESSION_ENABLED
        value: "true"
      - key: METRICS_ENABLED
        value: "true"

      # ── Rate Limiting ──────────────────────────────────────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "200"

      # ── Git info (injected by CI, fallback here) ──────────────────────────
      - key: GIT_COMMIT
        value: unknown
