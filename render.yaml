services:
  - type: web
    name: vv-networks-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false          # set in Render dashboard — never commit
      - key: CORS_ORIGIN
        sync: false          # set to your Vercel domain
